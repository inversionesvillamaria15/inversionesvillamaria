<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Nueva Reserva</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 15px; margin: 0; }
        .card { background: #1e293b; padding: 25px; border-radius: 25px; border: 1px solid #334155; max-width: 500px; margin: 10px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #f8fafc; margin-bottom: 5px; font-size: 20px; }
        .asesor-header { text-align: center; color: #10b981; font-size: 12px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: bold; margin-top: 12px; display: block; }
        input, select { width: 100%; background: #0f172a; border: 1px solid #475569; color: #10b981; padding: 10px; border-radius: 12px; margin-top: 4px; box-sizing: border-box; font-size: 14px; outline: none; font-family: inherit; }
        input:focus, select:focus { border-color: #3b82f6; }
        .money-input { color: #fbbf24; font-weight: 800; }
        input:read-only { background: #1e293b; color: #3b82f6; border-style: dashed; cursor: not-allowed; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        #id-box { background: #334155; color: #3b82f6; text-align: center; padding: 8px; border-radius: 10px; font-weight: bold; margin-top: 5px; border: 1px dashed #3b82f6; }
        .btn { background: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #334155; cursor: not-allowed; opacity: 0.5; }
        .rep-box { border: 1px dashed #475569; padding: 15px; margin-top: 10px; border-radius: 12px; display: none; background: #0b1120;}
        .file-upload { border: 2px dashed #10b981; background: rgba(16, 185, 129, 0.1); padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Nuevo Cliente</h2>
    <div class="asesor-header" id="txt-asesor">Cargando Asesor...</div>
    
    <label>Nombre Completo</label>
    <input type="text" id="nombre" oninput="actualizarTodo()">

    <div class="grid">
        <div><label>Polígono</label><input type="text" id="poligono" oninput="actualizarTodo()"></div>
        <div><label>Lote</label><input type="text" id="lote" oninput="actualizarTodo()"></div>
    </div>

    <label>ID Automático</label>
    <div id="id-box">Esperando datos...</div>

    <div class="grid">
        <div><label>DUI</label><input type="text" id="dui" placeholder="00000000-0"></div>
        <div><label>Teléfono</label><input type="text" id="telefono" placeholder="7777-7777"></div>
    </div>

    <label>Correo Electrónico</label>
    <input type="email" id="correo">

    <label style="color:#fbbf24">¿Tiene Representante Legal?</label>
    <select id="tiene_rep" onchange="toggleRep()">
        <option value="No">No</option>
        <option value="Si">Sí</option>
    </select>

    <div id="rep-fields" class="rep-box">
        <label>Nombre del Representante</label>
        <input type="text" id="rep_nombre">
        <div class="grid">
            <div><label>DUI Representante</label><input type="text" id="rep_dui" placeholder="00000000-0"></div>
            <div><label>Tel. Representante</label><input type="text" id="rep_tel" placeholder="7777-7777"></div>
        </div>
    </div>
    <div class="grid">
        <div><label>Precio Total</label><input type="text" id="precio" class="money-input" oninput="formatearMoneda(this); actualizarTodo()"></div>
        <div><label>Cuota Mensual</label><input type="text" id="cuota" class="money-input" oninput="formatearMoneda(this)"></div>
    </div>

    <div class="grid">
        <div><label>Años Plazo</label><input type="number" id="anios" oninput="actualizarTodo()"></div>
        <div>
            <label>Condición</label>
            <select id="condicion">
                <option value="Normal">Normal</option>
                <option value="SinIntereses">Sin Intereses</option>
            </select>
        </div>
    </div>

    <label>Fecha Límite 1ª Cuota</label>
    <input type="date" id="fecha_limite">

    <div class="grid">
        <div><label>Prima</label><input type="text" id="prima" class="money-input" oninput="formatearMoneda(this); actualizarTodo()"></div>
        <div><label>Monto a Financiar</label><input type="text" id="monto_financiar" class="money-input" readonly></div>
    </div>

    <label>Comprobante de Reserva (Obligatorio)</label>
    <input type="file" id="comprobante" accept="image/*,application/pdf" class="file-upload">

    <button id="btn" class="btn" onclick="enviar()">REGISTRAR CLIENTE</button>
</div>

<script>
   const params = new URLSearchParams(window.location.search);
    const SCRIPT_URL = params.get('url') || "https://script.google.com/macros/s/AKfycbzj1xEY_4Ma3gJtPrwDPJvmUtRM9Pi5VTf3CMVfmtc7veb755O9JxfwNmEershMzgGu/exec";
    const NOMBRE_ASESOR = params.get('asesor') || "Eduardo Torres";

    document.getElementById('txt-asesor').innerText = "Asesor: " + NOMBRE_ASESOR;

    // Lógica para mostrar/ocultar el representante
    function toggleRep() {
        const val = document.getElementById('tiene_rep').value;
        document.getElementById('rep-fields').style.display = (val === "Si") ? "block" : "none";
    }

    // Variables para el archivo
    let fileBase64 = "";
    let fileName = "";
    let fileType = "";

    document.getElementById('comprobante').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        fileName = file.name;
        fileType = file.type;
        const reader = new FileReader();
        reader.onload = function(event) {
            fileBase64 = event.target.result.split(',')[1];
        };
        reader.readAsDataURL(file);
    });

    function formatearMoneda(input) {
        let valor = input.value.replace(/\D/g, "");
        if (valor === "") { input.value = ""; return; }
        valor = (parseInt(valor) / 100).toFixed(2);
        input.value = "$" + valor.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function limpiarNumero(texto) {
        return texto.replace(/[$,]/g, "") || "0";
    }

    function actualizarTodo() {
        const nom = document.getElementById('nombre').value.trim();
        const pol = document.getElementById('poligono').value.trim().toLowerCase();
        const lot = document.getElementById('lote').value.trim().toLowerCase();
        
        if(nom && pol && lot) {
            document.getElementById('id-box').innerText = nom.charAt(0).toLowerCase() + pol + lot;
        }

        const precio = parseFloat(limpiarNumero(document.getElementById('precio').value)) || 0;
        const prima = parseFloat(limpiarNumero(document.getElementById('prima').value)) || 0;
        const financiar = precio - prima;
        let resFinanciar = financiar > 0 ? financiar.toFixed(2) : "0.00";
        document.getElementById('monto_financiar').value = "$" + resFinanciar.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

   async function enviar() {
        // Validación del comprobante obligatorio
        if (!fileBase64) {
            alert("⚠️ Debes anexar el comprobante de reserva obligatoriamente.");
            return;
        }

        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerText = "SUBIENDO ARCHIVO Y PROCESANDO...";

        const payload = {
            action: "registrarNuevoCliente",
            asesor: NOMBRE_ASESOR,
            id: document.getElementById('id-box').innerText,
            nombre: document.getElementById('nombre').value,
            poligono: document.getElementById('poligono').value,
            lote: document.getElementById('lote').value,
            dui: document.getElementById('dui').value,
            telefono: document.getElementById('telefono').value,
            correo: document.getElementById('correo').value,
            precio: limpiarNumero(document.getElementById('precio').value),
            cuota: limpiarNumero(document.getElementById('cuota').value),
            anios: document.getElementById('anios').value,
            fecha_limite: document.getElementById('fecha_limite').value,
            condicion: document.getElementById('condicion').value,
            prima: limpiarNumero(document.getElementById('prima').value),
            monto_financiar: limpiarNumero(document.getElementById('monto_financiar').value),
            
            // Datos del representante
            rep_legal: document.getElementById('tiene_rep').value,
            rep_nombre: document.getElementById('rep_nombre').value,
            rep_dui: document.getElementById('rep_dui').value,
            rep_tel: document.getElementById('rep_tel').value,

            // Archivo adjunto
            comprobante_base64: fileBase64,
            comprobante_nombre: fileName,
            comprobante_mime: fileType
        };

        try {
            // El fetch ahora espera y lee la respuesta exacta de Google
            const respuesta = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const datosServidor = await respuesta.json();

            // Si Google responde que hubo un error interno
            if (datosServidor.status === "error") {
                alert("❌ ERROR EXACTO DE GOOGLE:\n\n" + datosServidor.message);
                btn.disabled = false;
                btn.innerText = "REGISTRAR CLIENTE";
            } else {
                alert("✅ Registro y comprobante enviados a Reservas.");
                location.reload();
            }

        } catch (e) {
            // Si el error es de red o de permisos de Google (CORS)
            alert("❌ ERROR CRÍTICO DE CONEXIÓN:\n\n" + e.message + "\n\n¿Sacaste una 'Nueva versión' en el Script?");
            btn.disabled = false;
            btn.innerText = "REGISTRAR CLIENTE";
        }
    }
</script>
</body>
</html>
